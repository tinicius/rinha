services:
  nginx:
    image: nginx:latest
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api_1
      - api_2

  api_1:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "175MB"
    image: "tinicius/rinha:latest"
    environment:
      - PORT=3000
    ports:
      - "3000:3000"

  api_2:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "175MB"
    image: "tinicius/rinha:latest"
    environment:
      - PORT=3001
    ports:
      - "3001:3001"
