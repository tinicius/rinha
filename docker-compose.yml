services:
  nginx:
    image: nginx:latest
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "300MB"
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api_1
      - api_2

  api_1:
    image: "tinicius/rinha:latest"
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "25MB"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - PORT=3000
    ports:
      - "3000:3000"

  api_2:
    image: "tinicius/rinha:latest"
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "25MB"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - PORT=3001
    ports:
      - "3001:3001"
